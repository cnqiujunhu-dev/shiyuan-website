<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户登录 · 诸城叙梦素材管理平台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Preview Banner */
    .preview-banner {
      background: #fbbf24;
      padding: 8px 16px;
      text-align: center;
      font-size: 13px;
      color: #78350f;
      font-weight: 500;
      position: sticky;
      top: 0;
      z-index: 999;
      flex-shrink: 0;
    }
    .preview-banner a { color: #92400e; font-weight: 700; text-decoration: underline; }

    /* Page */
    .page {
      flex: 1;
      background: linear-gradient(135deg, #1e1b4b 0%, #3730a3 50%, #7c3aed 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      position: relative;
      overflow: hidden;
    }

    /* Decorative circles */
    .page::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      top: -100px;
      right: -100px;
    }
    .page::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      bottom: -80px;
      left: -80px;
    }

    /* Card */
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 8px;
    }
    .logo-text {
      font-size: 22px;
      font-weight: 800;
      color: #1e1b4b;
      letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 2px;
    }

    /* Title */
    .title { font-size: 24px; font-weight: 700; color: #1f2937; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 28px; }

    /* Divider */
    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 0 -40px 28px;
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      color: #1f2937;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
      background: white;
    }

    /* Input with icon */
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
    }
    .input-wrap .form-input { padding-left: 38px; }

    /* Button */
    .btn {
      width: 100%;
      padding: 12px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }
    .btn:hover { background: #6d28d9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    /* Links */
    .links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }
    .link {
      font-size: 13px;
      color: #7c3aed;
      text-decoration: none;
      font-weight: 500;
    }
    .link:hover { text-decoration: underline; }

    /* Remember me */
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #7c3aed;
      cursor: pointer;
    }
    .remember label { font-size: 13px; color: #6b7280; cursor: pointer; }

    /* Alert */
    .alert-info {
      background: #ede9fe;
      border: 1px solid #c4b5fd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #5b21b6;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="preview-banner">
    👀 预览模式 — 仅供设计审阅使用，数据均为模拟数据 &nbsp;|&nbsp;
    <a href="index.html">← 预览首页</a>
  </div>

  <div class="page">
    <div class="card">
      <div class="logo">
        <span class="logo-icon">📦</span>
        <div class="logo-text">诸城叙梦</div>
        <div class="logo-sub">素材管理平台</div>
      </div>

      <div class="divider"></div>

      <div class="title">欢迎回来</div>
      <div class="subtitle">登录您的账户继续使用</div>

      <div class="alert-info">
        💡 演示账号：花小绘 &nbsp;/&nbsp; 密码已预填
      </div>

      <form>
        <div class="form-group">
          <label class="form-label">用户名</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" class="form-input" value="花小绘" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" class="form-input" value="demo123456" />
          </div>
        </div>
        <div class="remember">
          <input type="checkbox" id="remember" checked />
          <label for="remember">记住我</label>
        </div>
        <button type="button" class="btn">登 录</button>
      </form>

      <div class="links">
        <a href="user-register.html" class="link">还没有账户？立即注册</a>
        <a href="#" class="link">忘记密码？</a>
      </div>
    </div>
  </div>
</body>
</html>
