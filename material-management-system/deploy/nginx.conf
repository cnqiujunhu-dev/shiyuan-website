# 诸城叙梦素材管理平台 — Nginx 生产配置
# 架构：用户前台 (frontend-vue) + 管理后台 (admin-vue) + API 后端 (backend)
#
# 使用前请替换：
#   your-domain.com       → 实际用户域名（例如 sy.example.com）
#   admin.your-domain.com → 实际管理后台域名（例如 admin.sy.example.com）
#   /var/www/shiyuan      → 实际部署根目录

# ─────────────────────────────────────────────
# HTTP → HTTPS 全站重定向
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com www.your-domain.com admin.your-domain.com;
    return 301 https://$host$request_uri;
}

# ─────────────────────────────────────────────
# 用户前台  https://your-domain.com
# ─────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.com www.your-domain.com;

    # SSL 证书（由 Certbot 自动填写，或手动指定）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 安全响应头
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # 前端静态资源
    root  /var/www/shiyuan/frontend/dist;
    index index.html;

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite 构建产物的长期缓存（带 hash 的文件名）
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API 反向代理 → Node.js 后端
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  "upgrade";
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 上传文件超时
        client_max_body_size 50m;
        proxy_read_timeout   120s;
        proxy_send_timeout   120s;
    }

    # 上传目录静态访问（可选，如使用本地存储缩略图）
    location /uploads/ {
        alias /var/www/shiyuan/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}

# ─────────────────────────────────────────────
# 管理后台  https://admin.your-domain.com
# ─────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name admin.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/admin.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 可选：限制管理后台只允许特定 IP 访问
    # allow 1.2.3.4;
    # deny all;

    add_header X-Frame-Options        "DENY"         always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;

    root  /var/www/shiyuan/admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  "upgrade";
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        client_max_body_size 50m;
        proxy_read_timeout   120s;
        proxy_send_timeout   120s;
    }

    location /uploads/ {
        alias /var/www/shiyuan/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location ~ /\. {
        deny all;
    }
}
