<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>素材管理系统 - 注册</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- 预览提示条 -->
<div class="preview-bar">
  <strong>🎨 设计预览模式</strong> — 仅供美工参考
  <nav class="preview-nav">
    <a href="index.html">素材库</a>
    <a href="upload.html">上传</a>
    <a href="login.html">登录</a>
    <a href="register.html" class="cur">注册</a>
  </nav>
</div>

<!-- 导航栏 -->
<nav class="nav">
  <a href="index.html" class="nav-brand">📦 素材管理系统</a>
  <a href="login.html" class="nav-link">登录</a>
  <a href="register.html" class="nav-link active">注册</a>
</nav>

<!-- 注册表单 -->
<div class="form-page">
  <div class="form-container">
    <h2 class="form-title">创建账户</h2>
    <p class="form-subtitle">加入素材管理系统</p>

    <form onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input
          class="form-input"
          type="text"
          placeholder="3-20 位字母、数字或中文"
        />
      </div>
      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input
          class="form-input"
          type="email"
          placeholder="your@email.com"
        />
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input
          class="form-input"
          type="password"
          placeholder="至少 6 位字符"
        />
      </div>
      <button type="submit" class="btn btn-primary form-submit" id="regBtn">
        注册
      </button>
    </form>
    <p class="form-link">已有账户？<a href="login.html">立即登录</a></p>
  </div>
</div>

<!-- 状态预览区 -->
<div style="padding:32px 40px; background:#f8fafc; border-top:1px solid #e2e8f0;">
  <p style="font-size:12px;color:#94a3b8;text-align:center;margin-bottom:20px;">— 以下为各状态展示，供参考 —</p>
  <div style="display:flex;gap:24px;justify-content:center;flex-wrap:wrap;">

    <!-- 字段校验错误 -->
    <div style="width:360px;">
      <p style="font-size:12px;color:#64748b;margin-bottom:8px;font-weight:600;">❌ 校验错误</p>
      <div class="form-container" style="margin:0;padding:28px;">
        <div class="form-error">用户名长度须为 3-20 个字符</div>
        <div class="form-group" style="margin-bottom:12px">
          <label class="form-label">用户名</label>
          <input class="form-input" type="text" value="ab" style="border-color:#ef4444;" />
        </div>
        <div class="form-group" style="margin-bottom:12px">
          <label class="form-label">邮箱</label>
          <input class="form-input" type="email" value="test@example.com" />
        </div>
        <div class="form-group" style="margin-bottom:12px">
          <label class="form-label">密码</label>
          <input class="form-input" type="password" value="•••••" />
        </div>
        <button class="btn btn-primary form-submit" disabled>注册</button>
      </div>
    </div>

    <!-- 重名错误 -->
    <div style="width:360px;">
      <p style="font-size:12px;color:#64748b;margin-bottom:8px;font-weight:600;">⚠️ 用户名已存在</p>
      <div class="form-container" style="margin:0;padding:28px;">
        <div class="form-error">用户名或邮箱已被使用</div>
        <div class="form-group" style="margin-bottom:12px">
          <label class="form-label">用户名</label>
          <input class="form-input" type="text" value="admin" style="border-color:#ef4444;" />
        </div>
        <div class="form-group" style="margin-bottom:12px">
          <label class="form-label">邮箱</label>
          <input class="form-input" type="email" value="admin@test.com" />
        </div>
        <div class="form-group" style="margin-bottom:12px">
          <label class="form-label">密码</label>
          <input class="form-input" type="password" value="••••••••" />
        </div>
        <button class="btn btn-primary form-submit" disabled>注册</button>
      </div>
    </div>

  </div>
</div>

<script>
  function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('regBtn');
    btn.disabled = true;
    btn.textContent = '注册中...';
    setTimeout(() => {
      window.location.href = 'login.html';
    }, 1200);
  }
</script>
</body>
</html>
