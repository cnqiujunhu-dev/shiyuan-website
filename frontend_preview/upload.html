<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>上传素材 - 素材管理系统</title>
  <style>
    body {
      background-color: #f5f7fa;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background-color: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 350px;
    }
    h2 { margin-top: 0; }
    label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 0.6rem;
      background-color: #2b72ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background-color: #1e5cd0; }
  </style>
</head>
<body>
  <div class="card">
    <h2>上传素材</h2>
    <form>
      <label for="file">选择文件</label>
      <input type="file" id="file" />
      <label for="desc">描述</label>
      <input type="text" id="desc" placeholder="请输入描述" />
      <label for="tags">标签（逗号分隔）</label>
      <input type="text" id="tags" placeholder="如：风景, 自然" />
      <label for="category">分类</label>
      <input type="text" id="category" placeholder="如：图片" />
      <button type="submit">上传</button>
    </form>
  </div>
</body>
</html>
